name: Build kiro

on:
  push:
    tags:
      - "v*"          # v1.2 などのタグをpushしたときに自動ビルド

# macOS 版は署名・公証 (notarization) の問題により Gatekeeper に強制削除されるため配布停止中。
# build-mac ジョブはコメントアウトで無効化。Windows のみビルド・リリースする。

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 依存インストール
        run: pip install -r requirements.txt

      - name: ビルド（Windows）
        run: |
          pyinstaller `
            --noconsole `
            --onefile `
            --name kiro `
            --distpath dist `
            --workpath .pyinstaller_work `
            --noconfirm `
            --add-data "src;src" `
            main.py

      - name: zip 作成（Windows）
        run: |
          New-Item -ItemType Directory -Path dist\_stage
          Copy-Item dist\kiro.exe dist\_stage\
          Copy-Item README.md dist\_stage\
          Compress-Archive -Path dist\_stage\* -DestinationPath kiro_win_${{ github.ref_name }}.zip

      - name: アップロード（Windows）
        uses: actions/upload-artifact@v4
        with:
          name: kiro-windows
          path: kiro_win_${{ github.ref_name }}.zip

  release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Windows zip ダウンロード
        uses: actions/download-artifact@v4
        with:
          name: kiro-windows

      - name: GitHub Release 作成
        uses: softprops/action-gh-release@v2
        with:
          files: |
            kiro_win_${{ github.ref_name }}.zip
